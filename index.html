<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HairMatch — Теггинг</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --card: #111;
    --card2: #181818;
    --border: #222;
    --border2: #2a2a2a;
    --text: #e0e0e0;
    --dim: #555;
    --dim2: #777;
    --radius: 10px;
    --agree: #4ade80;
    --disagree: #f87171;
    --consensus: #a78bfa;
    --warn: #facc15;
    --shortcut: #38bdf8;
  }

  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    min-height: 100vh;
    -webkit-tap-highlight-color: transparent;
  }

  /* ── Header ── */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .logo {
    font-family: 'Montserrat', sans-serif;
    font-weight: 900;
    font-size: 18px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--consensus);
    white-space: nowrap;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .progress-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--dim2);
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
    white-space: nowrap;
  }

  .barber-select {
    background: var(--card);
    color: var(--text);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 6px 10px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    cursor: pointer;
    outline: none;
    max-width: 130px;
  }

  .barber-select:focus {
    border-color: var(--consensus);
  }

  /* ── Main layout ── */
  .main {
    max-width: 600px;
    margin: 0 auto;
    padding: 16px 16px 40px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* ── Photo card ── */
  .photo-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    position: relative;
  }

  .photo-wrap {
    position: relative;
    overflow: hidden;
    background: #000;
  }

  .photo-wrap img {
    display: block;
    width: 100%;
    max-height: 55vh;
    object-fit: contain;
    transition: opacity 0.25s ease;
  }

  .photo-wrap img.fade-out {
    opacity: 0;
  }

  .tagged-overlay {
    position: absolute;
    top: 10px;
    right: 10px;
    background: rgba(167, 139, 250, 0.85);
    color: #fff;
    font-size: 11px;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    padding: 3px 8px;
    border-radius: 20px;
    letter-spacing: 0.04em;
    display: none;
  }

  .photo-meta {
    padding: 8px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid var(--border);
  }

  .photo-filename {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--dim2);
  }

  .photo-nav {
    display: flex;
    gap: 8px;
  }

  .nav-btn {
    background: var(--card2);
    color: var(--dim2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 12px;
    font-size: 14px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
    touch-action: manipulation;
    min-width: 36px;
    min-height: 32px;
  }

  .nav-btn:hover, .nav-btn:active {
    color: var(--text);
    border-color: var(--border2);
  }

  .nav-btn:disabled {
    opacity: 0.3;
    cursor: default;
  }

  /* ── Shortcuts bar ── */
  .shortcuts-bar {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 4px 0;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }

  .shortcuts-bar::-webkit-scrollbar { display: none; }

  .shortcut-btn {
    flex-shrink: 0;
    background: transparent;
    color: var(--shortcut);
    border: 1px solid var(--shortcut);
    border-radius: 20px;
    padding: 7px 14px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    touch-action: manipulation;
    white-space: nowrap;
  }

  .shortcut-btn:hover, .shortcut-btn:active {
    background: rgba(56, 189, 248, 0.15);
  }

  .shortcut-btn.used {
    background: rgba(56, 189, 248, 0.12);
    color: var(--shortcut);
  }

  /* ── Tag sections ── */
  .tags-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 2px;
  }

  .tag-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }

  .tag-row.conditional {
    overflow: hidden;
    max-height: 0;
    opacity: 0;
    margin: 0;
    padding: 0;
    transition: max-height 0.3s ease, opacity 0.25s ease, margin 0.3s ease;
  }

  .tag-row.conditional.visible {
    max-height: 80px;
    opacity: 1;
    margin-top: 0;
  }

  .tag-label {
    font-size: 13px;
    font-weight: 500;
    color: var(--dim2);
    white-space: nowrap;
    padding-top: 7px;
    min-width: 72px;
    flex-shrink: 0;
  }

  .btn-group {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .tag-btn {
    background: var(--card2);
    color: var(--dim2);
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 6px 13px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    touch-action: manipulation;
    min-height: 34px;
    line-height: 1.2;
    user-select: none;
  }

  .tag-btn:hover {
    border-color: var(--dim);
    color: var(--text);
  }

  .tag-btn.active {
    background: rgba(167, 139, 250, 0.18);
    border-color: var(--consensus);
    color: var(--consensus);
  }

  /* ── Notes ── */
  .notes-input {
    background: var(--card2);
    color: var(--text);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 9px 12px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    width: 100%;
    outline: none;
    resize: none;
    transition: border-color 0.15s;
    min-height: 44px;
  }

  .notes-input:focus {
    border-color: var(--consensus);
  }

  .notes-input::placeholder {
    color: var(--dim);
  }

  /* ── Action buttons ── */
  .actions {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .btn-save {
    background: var(--agree);
    color: #0a0a0a;
    border: none;
    border-radius: var(--radius);
    padding: 16px;
    font-family: 'Montserrat', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.04em;
    cursor: pointer;
    width: 100%;
    transition: opacity 0.15s, transform 0.1s;
    touch-action: manipulation;
    min-height: 52px;
  }

  .btn-save:hover { opacity: 0.92; }
  .btn-save:active { transform: scale(0.98); }
  .btn-save:disabled { opacity: 0.45; cursor: default; }

  .btn-not-haircut {
    background: rgba(248, 113, 113, 0.12);
    color: var(--disagree);
    border: 1px solid rgba(248, 113, 113, 0.35);
    border-radius: var(--radius);
    padding: 13px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    transition: background 0.15s, transform 0.1s;
    touch-action: manipulation;
    min-height: 46px;
  }

  .btn-not-haircut:hover { background: rgba(248, 113, 113, 0.2); }
  .btn-not-haircut:active { transform: scale(0.98); }
  .btn-not-haircut:disabled { opacity: 0.45; cursor: default; }

  .btn-reset {
    background: none;
    color: var(--dim);
    border: none;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    cursor: pointer;
    padding: 4px 0;
    text-align: center;
    width: 100%;
    text-decoration: underline;
    text-underline-offset: 3px;
  }

  .btn-reset:hover { color: var(--dim2); }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--card);
    color: var(--text);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 12px 20px;
    font-size: 14px;
    font-weight: 500;
    z-index: 999;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s;
    opacity: 0;
    pointer-events: none;
    max-width: 320px;
    text-align: center;
    white-space: pre-line;
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }

  .toast.error {
    border-color: var(--disagree);
    color: var(--disagree);
  }

  .toast.success {
    border-color: var(--agree);
    color: var(--agree);
  }

  /* ── Completion screen ── */
  .completion {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 60px 24px;
    gap: 16px;
  }

  .completion.visible {
    display: flex;
  }

  .completion-icon {
    font-size: 56px;
    line-height: 1;
  }

  .completion h2 {
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 22px;
    color: var(--agree);
  }

  .completion p {
    color: var(--dim2);
    font-size: 15px;
    max-width: 280px;
  }

  /* ── Modal overlay ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: rgba(0, 0, 0, 0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .modal-overlay.hidden {
    display: none;
  }

  .modal-box {
    background: var(--card);
    border: 1px solid var(--border2);
    border-radius: 14px;
    padding: 32px 28px;
    max-width: 340px;
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 16px;
    text-align: center;
  }

  .modal-box h2 {
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 20px;
    color: var(--text);
  }

  .modal-box p {
    color: var(--dim2);
    font-size: 14px;
  }

  .modal-input {
    background: var(--card2);
    color: var(--text);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 12px 14px;
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    width: 100%;
    outline: none;
    text-align: center;
    transition: border-color 0.15s;
  }

  .modal-input:focus {
    border-color: var(--consensus);
  }

  .modal-input::placeholder {
    color: var(--dim);
  }

  .modal-btn {
    background: var(--consensus);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 14px;
    font-family: 'Montserrat', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
    min-height: 48px;
    transition: opacity 0.15s;
  }

  .modal-btn:hover { opacity: 0.9; }
  .modal-btn:disabled { opacity: 0.4; cursor: default; }

  /* ── Loading ── */
  .loading-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 24px;
    gap: 12px;
    color: var(--dim2);
    font-size: 14px;
  }

  .spinner {
    width: 28px;
    height: 28px;
    border: 2px solid var(--border2);
    border-top-color: var(--consensus);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* ── Responsive ── */
  @media (min-width: 480px) {
    .tag-label {
      min-width: 90px;
    }
    .logo {
      font-size: 20px;
    }
  }
</style>
</head>
<body>

<header class="header">
  <div class="logo">HairMatch</div>
  <div class="header-right">
    <div class="progress-badge" id="progress-badge">— / —</div>
    <div class="barber-name-display" id="barber-name-display" style="font-size:13px; color:var(--consensus); cursor:pointer; padding:6px 10px; border:1px solid var(--border2); border-radius:8px;" title="Сменить имя"></div>
  </div>
</header>

<div class="modal-overlay" id="barber-modal">
  <div class="modal-box">
    <h2>Как вас зовут?</h2>
    <p>Введите имя, чтобы начать разметку</p>
    <input class="modal-input" id="barber-name-input" type="text" placeholder="Ваше имя" autocomplete="off" maxlength="30">
    <button class="modal-btn" id="barber-modal-btn" disabled>Начать</button>
  </div>
</div>

<div class="main" id="main-content">
  <!-- Populated by JS -->
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';

// ── Config ──────────────────────────────────────────────────────────────────
const WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbwXKgOuUi149mVce916gofyirOr-Bc05wIJdUxE0x8yF90oqFmVC9PWgRgRD5oqO2ZA/exec';
const TAGS_URL = 'tags-consensus.json';
const PHOTOS_DIR = 'photos/';
const SCHEMA_VERSION = 3;

// ── Dimensions ──────────────────────────────────────────────────────────────
const DIMENSIONS = {
  side_treatment: {
    label: 'Виски и затылок',
    values: {
      long_sides: 'Без фейда',
      taper:      'Тейпер',
      low_fade:   'Лоу фейд',
      mid_fade:   'Мид фейд',
      high_fade:  'Хай фейд'
    }
  },
  fade_finish: {
    label: 'Степень фейда',
    condition: (tags) => ['low_fade','mid_fade','high_fade'].includes(tags.side_treatment),
    values: {
      skin:   'Скин / До кожи',
      shadow: 'Шедоу / Теневой'
    }
  },
  fade_shape: {
    label: 'Форма фейда',
    condition: (tags) => ['low_fade','mid_fade','high_fade'].includes(tags.side_treatment),
    values: {
      straight: 'Прямой',
      drop:     'Дроп',
      burst:    'Бёрст'
    }
  },
  top_length: {
    label: 'Длина верха',
    values: {
      buzz:   'Базз (<1см)',
      short:  'Короткий (1-4см)',
      medium: 'Средний (4-10см)',
      long:   'Длинный (10см+)'
    }
  },
  styling_direction: {
    label: 'Направление',
    values: {
      forward:       'Вперёд / На лоб',
      up_and_back:   'Назад и вверх',
      side_swept:    'Набок',
      center_parted: 'Шторки / По центру',
      undirected:    'Текстурный / Без направления'
    }
  },
  transition: {
    label: 'Переход',
    values: {
      blended:      'Плавный',
      disconnected: 'Дисконнект',
      uniform:      'Одна длина'
    }
  },
  fringe: {
    label: 'Чёлка / Фронтальная зона',
    values: {
      none:       'Нет / Базз',
      swept_back: 'От лица',
      up:         'Вверх',
      textured:   'Рваная',
      blunt:      'Прямая',
      side_swept: 'Косая',
      curtain:    'Шторки'
    }
  },
  finish: {
    label: 'Финиш',
    values: {
      polished: 'Гладкий',
      textured: 'Текстурный',
      natural:  'Натуральный'
    }
  },
  design_elements: {
    label: 'Дизайн',
    multi_select: true,
    values: {
      hard_part:   'Хард парт',
      lineup:      'Лайн-ап',
      hair_design: 'Хэйр тату',
      none:        'Без дизайна'
    }
  },
  beard: {
    label: 'Борода',
    values: {
      none:    'Нет',
      stubble: 'Щетина',
      short:   'Короткая',
      full:    'Полная'
    }
  },
  face_visible: {
    label: 'Лицо',
    values: {
      full:    'Полное',
      partial: 'Частичное',
      profile: 'Профиль',
      back:    'Затылок'
    }
  }
};

const DIM_KEYS = Object.keys(DIMENSIONS);

// Fields that must be filled for save (excluding conditional when hidden)
const REQUIRED_KEYS = ['side_treatment', 'top_length', 'styling_direction', 'transition', 'fringe', 'finish', 'design_elements', 'beard', 'face_visible'];

// ── Shortcuts ───────────────────────────────────────────────────────────────
const SHORTCUTS = {
  'Кроп':     { side_treatment:'low_fade', fade_finish:'skin', fade_shape:'straight', top_length:'short', styling_direction:'forward', transition:'blended', fringe:'textured', finish:'textured', design_elements:['none'] },
  'Помпадур': { side_treatment:'low_fade', fade_finish:'skin', fade_shape:'straight', top_length:'medium', styling_direction:'up_and_back', transition:'blended', fringe:'swept_back', finish:'polished', design_elements:['none'] },
  'Андеркат': { side_treatment:'mid_fade', fade_finish:'shadow', fade_shape:'straight', top_length:'medium', styling_direction:'up_and_back', transition:'disconnected', fringe:'swept_back', finish:'polished', design_elements:['none'] },
  'Шторки':   { side_treatment:'taper', top_length:'medium', styling_direction:'center_parted', transition:'blended', fringe:'curtain', finish:'natural', design_elements:['none'] },
  'Эдгар':    { side_treatment:'high_fade', fade_finish:'skin', fade_shape:'straight', top_length:'short', styling_direction:'forward', transition:'disconnected', fringe:'blunt', finish:'textured', design_elements:['lineup'] },
  'Полубокс': { side_treatment:'low_fade', fade_finish:'shadow', fade_shape:'straight', top_length:'short', styling_direction:'forward', transition:'blended', fringe:'textured', finish:'natural', design_elements:['none'] },
  'Канадка':  { side_treatment:'taper', top_length:'medium', styling_direction:'side_swept', transition:'blended', fringe:'side_swept', finish:'polished', design_elements:['none'] },
  'Сликбэк':  { side_treatment:'low_fade', fade_finish:'skin', fade_shape:'straight', top_length:'medium', styling_direction:'up_and_back', transition:'blended', fringe:'swept_back', finish:'polished', design_elements:['none'] },
  'Базз':     { side_treatment:'taper', top_length:'buzz', styling_direction:'undirected', transition:'uniform', fringe:'none', finish:'natural', design_elements:['none'] }
};

// ── State ────────────────────────────────────────────────────────────────────
let photos = [];
let consensus = {};
let currentIdx = 0;
let currentTags = {};
let barberId = '';
let isSaving = false;

// ── localStorage helpers ──────────────────────────────────────────────────────
const LS_BARBER = 'hm_barber';
const LS_SCHEMA = 'hm_schema_version';
const lsTaggedKey = (bid) => `hm_tagged_${bid}`;
const lsBackupKey = (bid, fname) => `hm_backup_${bid}_${fname}`;

function migrateLocalStorage() {
  const stored = parseInt(localStorage.getItem(LS_SCHEMA) || '0', 10);
  if (stored < SCHEMA_VERSION) {
    // Clear old progress since schema changed
    const keys = Object.keys(localStorage);
    for (const k of keys) {
      if (k.startsWith('hm_tagged_') || k.startsWith('hm_backup_')) {
        localStorage.removeItem(k);
      }
    }
    localStorage.setItem(LS_SCHEMA, String(SCHEMA_VERSION));
  }
}

function getTagged(bid) {
  try { return JSON.parse(localStorage.getItem(lsTaggedKey(bid)) || '{}'); } catch { return {}; }
}

function markTagged(bid, fname) {
  const t = getTagged(bid);
  t[fname] = Date.now();
  localStorage.setItem(lsTaggedKey(bid), JSON.stringify(t));
}

function isTagged(bid, fname) {
  return !!getTagged(bid)[fname];
}

function saveBackup(bid, fname, payload) {
  localStorage.setItem(lsBackupKey(bid, fname), JSON.stringify(payload));
}

function resetProgress(bid) {
  localStorage.removeItem(lsTaggedKey(bid));
}

// ── Toast ─────────────────────────────────────────────────────────────────────
let toastTimer = null;
function showToast(msg, type = '', duration = 3000) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type ? ' ' + type : '');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = 'toast'; }, duration);
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  migrateLocalStorage();
  renderLoading();

  barberId = localStorage.getItem(LS_BARBER) || '';
  if (barberId) {
    hideBarberModal();
    updateBarberDisplay();
  } else {
    showBarberModal();
  }

  // Modal logic
  const modalInput = document.getElementById('barber-name-input');
  const modalBtn = document.getElementById('barber-modal-btn');

  modalInput.addEventListener('input', () => {
    modalBtn.disabled = !modalInput.value.trim();
  });

  modalBtn.addEventListener('click', () => submitBarberName());
  modalInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && modalInput.value.trim()) submitBarberName();
  });

  document.getElementById('barber-name-display').addEventListener('click', () => {
    showBarberModal();
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && barberId) hideBarberModal();
  });

  // Load consensus tags
  try {
    const resp = await fetch(TAGS_URL);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    consensus = await resp.json();
  } catch (e) {
    console.warn('Could not load tags-consensus.json:', e);
    consensus = {};
  }

  photos = Object.keys(consensus).sort().reverse();

  if (photos.length === 0) {
    renderEmpty();
    return;
  }

  currentIdx = findFirstUntagged();
  render();
}

function findFirstUntagged() {
  if (!barberId) return 0;
  const idx = photos.findIndex(f => !isTagged(barberId, f));
  return idx === -1 ? 0 : idx;
}

function countTagged() {
  if (!barberId) return 0;
  const t = getTagged(barberId);
  return photos.filter(f => t[f]).length;
}

// ── Rendering ─────────────────────────────────────────────────────────────────
function renderLoading() {
  document.getElementById('main-content').innerHTML = `
    <div class="loading-screen">
      <div class="spinner"></div>
      <div>Загрузка...</div>
    </div>`;
}

function renderEmpty() {
  document.getElementById('main-content').innerHTML = `
    <div class="completion visible">
      <div class="completion-icon">📂</div>
      <h2>Нет фото</h2>
      <p>Файл tags-consensus.json не найден или пуст.</p>
    </div>`;
}

function render() {
  const main = document.getElementById('main-content');

  const tagged = countTagged();
  const total = photos.length;
  document.getElementById('progress-badge').textContent =
    barberId ? `${tagged} / ${total}` : '— / —';

  if (!barberId) {
    showBarberModal();
    return;
  }

  if (tagged === total) {
    main.innerHTML = `
      <div class="completion visible">
        <div class="completion-icon">✅</div>
        <h2>Все фото размечены!</h2>
        <p>Отличная работа. Все ${total} фотографий обработаны.</p>
        <button class="btn-reset" id="btn-reset-all" style="margin-top:16px; font-size:13px; color: var(--dim2);">
          Сбросить прогресс
        </button>
      </div>`;
    document.getElementById('btn-reset-all').addEventListener('click', handleReset);
    return;
  }

  const fname = photos[currentIdx];
  const tagged_this = isTagged(barberId, fname);

  // Init tags for this photo if needed
  if (!currentTags._loaded_for || currentTags._loaded_for !== fname) {
    currentTags = { _loaded_for: fname };
    // Don't pre-fill new dimensions from old consensus — start blank
    for (const key of DIM_KEYS) {
      if (DIMENSIONS[key].multi_select) {
        currentTags[key] = [];
      } else {
        currentTags[key] = null;
      }
    }
    // Pre-fill beard and face_visible from old consensus if available
    const con = consensus[fname] || {};
    if (con.beard && DIMENSIONS.beard.values[con.beard]) currentTags.beard = con.beard;
    if (con.face_visible && DIMENSIONS.face_visible.values[con.face_visible]) currentTags.face_visible = con.face_visible;
    currentTags.notes = '';
  }

  main.innerHTML = buildPhotoCard(fname, tagged_this) +
    buildShortcutsBar() +
    buildTagsCard() +
    buildActionsCard();

  attachTagEvents();
  attachActionEvents(fname);
  updateConditionalRows();

  document.getElementById('btn-prev').disabled = currentIdx === 0;
  document.getElementById('btn-next').disabled = currentIdx === photos.length - 1;

  const notesEl = document.getElementById('notes-input');
  if (notesEl) notesEl.value = currentTags.notes || '';
}

function buildPhotoCard(fname, isTaggedPhoto) {
  return `
    <div class="photo-card">
      <div class="photo-wrap">
        <img id="main-photo" src="${PHOTOS_DIR}${encodeURIComponent(fname)}" alt="${fname}" loading="lazy">
        <div class="tagged-overlay" id="tagged-overlay" style="${isTaggedPhoto ? 'display:block' : ''}">✓ Размечено</div>
      </div>
      <div class="photo-meta">
        <span class="photo-filename">${fname}</span>
        <div class="photo-nav">
          <button class="nav-btn" id="btn-prev" title="Предыдущее">←</button>
          <button class="nav-btn" id="btn-next" title="Следующее">→</button>
        </div>
      </div>
    </div>`;
}

function buildShortcutsBar() {
  let btns = '';
  for (const name of Object.keys(SHORTCUTS)) {
    btns += `<button class="shortcut-btn" data-shortcut="${name}">${name}</button>`;
  }
  return `<div class="shortcuts-bar">${btns}</div>`;
}

function buildTagsCard() {
  let rows = '';
  for (const key of DIM_KEYS) {
    rows += buildTagRow(key);
  }
  return `<div class="tags-card">${rows}</div>`;
}

function buildTagRow(key) {
  const dim = DIMENSIONS[key];
  const isConditional = !!dim.condition;
  const isMulti = !!dim.multi_select;
  const selected = currentTags[key];

  let btns = '';
  for (const [val, label] of Object.entries(dim.values)) {
    let isActive;
    if (isMulti) {
      isActive = Array.isArray(selected) && selected.includes(val);
    } else {
      isActive = selected === val;
    }
    btns += `<button class="tag-btn${isActive ? ' active' : ''}" data-dim="${key}" data-val="${val}">${label}</button>`;
  }

  const conditionalClass = isConditional ? ' conditional' : '';
  return `
    <div class="tag-row${conditionalClass}" data-row="${key}">
      <div class="tag-label">${dim.label}</div>
      <div class="btn-group">${btns}</div>
    </div>`;
}

function buildActionsCard() {
  return `
    <div class="actions">
      <textarea class="notes-input" id="notes-input" placeholder="Заметки (необязательно)" rows="2"></textarea>
      <button class="btn-save" id="btn-save">Сохранить и далее</button>
      <button class="btn-not-haircut" id="btn-not-haircut">✕  Не стрижка</button>
      <button class="btn-reset" id="btn-reset">Сбросить прогресс</button>
    </div>`;
}

// ── Tag interaction ──────────────────────────────────────────────────────────
function attachTagEvents() {
  document.querySelectorAll('.tag-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const dim = btn.dataset.dim;
      const val = btn.dataset.val;
      const dimDef = DIMENSIONS[dim];

      if (dimDef.multi_select) {
        handleMultiSelect(dim, val);
      } else {
        currentTags[dim] = val;
        document.querySelectorAll(`.tag-btn[data-dim="${dim}"]`).forEach(b => {
          b.classList.toggle('active', b.dataset.val === val);
        });
      }

      // Update conditional rows when side_treatment changes
      if (dim === 'side_treatment') {
        updateConditionalRows();
      }
    });
  });

  // Shortcut buttons
  document.querySelectorAll('.shortcut-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const name = btn.dataset.shortcut;
      applyShortcut(name);
      // Visual feedback
      document.querySelectorAll('.shortcut-btn').forEach(b => b.classList.remove('used'));
      btn.classList.add('used');
    });
  });
}

function handleMultiSelect(dim, val) {
  let selected = Array.isArray(currentTags[dim]) ? [...currentTags[dim]] : [];

  if (val === 'none') {
    // Selecting "none" clears everything else
    selected = ['none'];
  } else {
    // Remove "none" if present
    selected = selected.filter(v => v !== 'none');
    // Toggle the value
    if (selected.includes(val)) {
      selected = selected.filter(v => v !== val);
    } else {
      selected.push(val);
    }
    // If nothing selected, default to empty
    if (selected.length === 0) selected = [];
  }

  currentTags[dim] = selected;

  // Update buttons
  document.querySelectorAll(`.tag-btn[data-dim="${dim}"]`).forEach(b => {
    b.classList.toggle('active', selected.includes(b.dataset.val));
  });
}

function updateConditionalRows() {
  for (const key of DIM_KEYS) {
    const dim = DIMENSIONS[key];
    if (!dim.condition) continue;
    const row = document.querySelector(`.tag-row[data-row="${key}"]`);
    if (!row) continue;

    const visible = dim.condition(currentTags);
    row.classList.toggle('visible', visible);

    // Clear conditional values when hidden
    if (!visible && currentTags[key]) {
      currentTags[key] = null;
      row.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
    }
  }
}

function applyShortcut(name) {
  const preset = SHORTCUTS[name];
  if (!preset) return;

  for (const [key, val] of Object.entries(preset)) {
    if (val === null || val === undefined) continue;
    currentTags[key] = val;

    // Update UI
    if (DIMENSIONS[key].multi_select) {
      document.querySelectorAll(`.tag-btn[data-dim="${key}"]`).forEach(b => {
        b.classList.toggle('active', Array.isArray(val) && val.includes(b.dataset.val));
      });
    } else {
      document.querySelectorAll(`.tag-btn[data-dim="${key}"]`).forEach(b => {
        b.classList.toggle('active', b.dataset.val === val);
      });
    }
  }

  updateConditionalRows();
}

function attachActionEvents(fname) {
  document.getElementById('btn-prev').addEventListener('click', () => navigate(-1));
  document.getElementById('btn-next').addEventListener('click', () => navigate(1));

  document.getElementById('btn-save').addEventListener('click', () => handleSave(fname, false));
  document.getElementById('btn-not-haircut').addEventListener('click', () => handleSave(fname, true));
  document.getElementById('btn-reset').addEventListener('click', handleReset);

  document.getElementById('notes-input').addEventListener('input', (e) => {
    currentTags.notes = e.target.value;
  });
}

// ── Navigation ────────────────────────────────────────────────────────────────
function navigate(delta) {
  const newIdx = currentIdx + delta;
  if (newIdx < 0 || newIdx >= photos.length) return;
  currentIdx = newIdx;
  currentTags = {};
  animatePhoto(() => render());
}

function animatePhoto(cb) {
  const img = document.getElementById('main-photo');
  if (!img) { cb(); return; }
  img.classList.add('fade-out');
  setTimeout(() => { cb(); }, 220);
}

// ── Save ──────────────────────────────────────────────────────────────────────
async function handleSave(fname, notHaircut) {
  if (isSaving) return;

  const notes = (document.getElementById('notes-input') || {}).value || '';
  currentTags.notes = notes;

  // Check conditional visibility
  const fadeVisible = DIMENSIONS.fade_finish.condition(currentTags);

  const payload = {
    timestamp: new Date().toISOString(),
    barber_id: barberId,
    photo_filename: fname,
    side_treatment: currentTags.side_treatment || '',
    fade_finish: fadeVisible ? (currentTags.fade_finish || '') : '',
    fade_shape: fadeVisible ? (currentTags.fade_shape || '') : '',
    top_length: currentTags.top_length || '',
    styling_direction: currentTags.styling_direction || '',
    transition: currentTags.transition || '',
    fringe: currentTags.fringe || '',
    finish: currentTags.finish || '',
    design_elements: Array.isArray(currentTags.design_elements) ? currentTags.design_elements.join(',') : '',
    beard: currentTags.beard || '',
    face_visible: currentTags.face_visible || '',
    usable: notHaircut ? false : true,
    notes: currentTags.notes || '',
  };

  // Validate required fields (only if usable)
  if (!notHaircut) {
    const missing = [];
    for (const key of REQUIRED_KEYS) {
      const dim = DIMENSIONS[key];
      // Skip conditional fields that are hidden
      if (dim.condition && !dim.condition(currentTags)) continue;
      const val = currentTags[key];
      if (dim.multi_select) {
        if (!Array.isArray(val) || val.length === 0) missing.push(dim.label);
      } else {
        if (!val) missing.push(dim.label);
      }
    }
    // Also require fade fields when visible
    if (fadeVisible) {
      if (!currentTags.fade_finish) missing.push(DIMENSIONS.fade_finish.label);
      if (!currentTags.fade_shape) missing.push(DIMENSIONS.fade_shape.label);
    }
    if (missing.length > 0) {
      showToast('Заполните:\n' + missing.join(', '), 'error', 4000);
      return;
    }
  }

  isSaving = true;
  setSavingState(true);

  saveBackup(barberId, fname, payload);

  try {
    await fetch(WEBHOOK_URL, {
      method: 'POST',
      body: JSON.stringify(payload),
      mode: 'no-cors',
    });

    markTagged(barberId, fname);
    showToast(notHaircut ? 'Пропущено' : 'Сохранено ✓', 'success');
    advanceToNext();

  } catch (e) {
    console.error('Webhook error:', e);
    showToast('Ошибка отправки. Попробуйте ещё раз.', 'error');
  } finally {
    isSaving = false;
    setSavingState(false);
  }
}

function setSavingState(saving) {
  const btnSave = document.getElementById('btn-save');
  const btnNot = document.getElementById('btn-not-haircut');
  if (btnSave) { btnSave.disabled = saving; btnSave.textContent = saving ? 'Сохранение...' : 'Сохранить и далее'; }
  if (btnNot) btnNot.disabled = saving;
}

function advanceToNext() {
  const nextIdx = photos.findIndex((f, i) => i > currentIdx && !isTagged(barberId, f));
  if (nextIdx !== -1) {
    currentIdx = nextIdx;
  } else {
    const fromStart = photos.findIndex(f => !isTagged(barberId, f));
    if (fromStart !== -1) currentIdx = fromStart;
  }
  currentTags = {};
  animatePhoto(() => render());
}

// ── Reset ─────────────────────────────────────────────────────────────────────
function handleReset() {
  if (!confirm('Сбросить весь прогресс для этого барбера? Это действие нельзя отменить.')) return;
  if (barberId) resetProgress(barberId);
  currentIdx = 0;
  currentTags = {};
  render();
  showToast('Прогресс сброшен', '', 2500);
}

// ── Barber modal ──────────────────────────────────────────────────────────────
function showBarberModal() {
  const modal = document.getElementById('barber-modal');
  const input = document.getElementById('barber-name-input');
  modal.classList.remove('hidden');
  input.value = '';
  document.getElementById('barber-modal-btn').disabled = true;
  setTimeout(() => input.focus(), 100);
}

function hideBarberModal() {
  document.getElementById('barber-modal').classList.add('hidden');
}

function updateBarberDisplay() {
  document.getElementById('barber-name-display').textContent = barberId;
}

function submitBarberName() {
  const name = document.getElementById('barber-name-input').value.trim();
  if (!name) return;
  barberId = name.toLowerCase();
  localStorage.setItem(LS_BARBER, barberId);
  hideBarberModal();
  updateBarberDisplay();
  currentIdx = findFirstUntagged();
  render();
}

// ── Start ─────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
